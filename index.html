<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 자산 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0b0e; --surface:#111318; --surface2:#181c24; --border:#1e2330;
  --text:#e8eaf0; --muted:#5a6070; --accent:#4fffb0; --red:#ff4d6d; --green:#4fffb0;
  --mono:'DM Mono',monospace; --sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(78,255,176,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(78,255,176,.025) 1px,transparent 1px);
  background-size:40px 40px;}
.wrapper{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:32px 24px;}

header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.h1{font-family:var(--sans);font-size:26px;font-weight:800;letter-spacing:-.5px;}
.h1 span{color:var(--accent);}
.hsub{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.1em;text-transform:uppercase;}
.update-time{font-size:11px;color:var(--muted);}
.dot{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.section-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;}
.g21{display:grid;grid-template-columns:3fr 2fr;gap:20px;margin-bottom:20px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:1100px){.g5{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){.g21,.g2{grid-template-columns:1fr;}}
@media(max-width:700px){.g5{grid-template-columns:repeat(2,1fr);}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;position:relative;transition:border-color .2s;}
.card:hover{border-color:rgba(78,255,176,.2);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .3s;}
.card:hover::before{opacity:1;}

.sbar{width:24px;height:3px;border-radius:2px;margin-bottom:10px;}
.clabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.cval{font-family:var(--sans);font-size:20px;font-weight:700;letter-spacing:-.5px;}
.csub{font-size:11px;margin-top:5px;}
.up{color:var(--green);} .down{color:var(--red);} .neutral{color:var(--muted);}

.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.ctitle{font-family:var(--sans);font-size:14px;font-weight:700;}
.cbadge{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--surface2);color:var(--muted);}

/* 차트 영역 — 내부만 클리핑, 바깥 툴팁은 노출 */
.chart-outer{overflow:visible;position:relative;}
.cw{position:relative;height:240px;overflow:hidden;border-radius:4px;}
.cw-lg{position:relative;height:280px;overflow:hidden;border-radius:4px;}

/* 도넛 */
.dlayout{display:flex;align-items:center;gap:20px;padding:6px 0;}
.dbox{position:relative;flex-shrink:0;}
.dcenter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:85px;}
.dcval{font-family:var(--sans);font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dclabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.legend{flex:1;display:flex;flex-direction:column;gap:9px;}
.li{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.ll{display:flex;align-items:center;gap:7px;color:var(--muted);}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.lpct{font-family:var(--sans);font-weight:700;font-size:12px;}
.lval{font-size:10px;color:var(--muted);margin-top:1px;}

.sbars{display:flex;flex-direction:column;gap:16px;padding-top:4px;}
.sbname{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.sbamt{font-family:var(--sans);font-size:13px;font-weight:700;}
.sbpct{font-size:10px;color:var(--muted);}
.track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;}
.fill{height:100%;border-radius:2px;transition:width 1s ease;}

.loading{display:flex;align-items:center;justify-content:center;height:100%;min-height:100px;color:var(--muted);font-size:12px;flex-direction:column;gap:10px;}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.err{color:var(--red);font-size:11px;text-align:center;padding:20px;line-height:1.8;}

.tab-group{display:flex;gap:4px;}
.tab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);
  font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;transition:all .15s;letter-spacing:.05em;}
.tab:hover{border-color:rgba(78,255,176,.3);color:var(--text);}
.tab.active{background:rgba(78,255,176,.12);border-color:rgba(78,255,176,.4);color:var(--accent);}

/* ── 모바일 ── */
@media(max-width:480px){
  .wrapper{padding:20px 14px;}
  header{margin-bottom:24px;padding-bottom:16px;flex-direction:column;align-items:flex-start;gap:8px;}
  .h1{font-size:22px;}
  .update-time{font-size:10px;}

  /* 상단 카드: 2열 */
  .g5{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  /* 총자산 카드만 전체 폭 */
  .g5 .card:first-child{grid-column:1/-1;}
  .cval{font-size:17px;}
  .card{padding:14px 14px!important;}

  /* 차트 높이 줄이기 */
  .cw{height:180px;}
  .cw-lg{height:200px;}

  /* 도넛: 세로 배치 */
  .dlayout{flex-direction:column;align-items:center;gap:12px;padding:4px 0;}
  .legend{width:100%;}
  .li{font-size:11px;}

  /* 시장 지수 차트 헤더: 타이틀+뱃지 위, 탭 아래 */
  .ch{flex-wrap:wrap;gap:8px;}
  .ctitle{font-size:13px;}
  .tab-group{width:100%;}
  .tab{flex:1;text-align:center;padding:5px 4px;font-size:10px;}

  .section-label{font-size:9px;margin-bottom:10px;}
  .g21,.g2{gap:12px;margin-bottom:14px;}
}
</style>
</head>
<body>
<div class="wrapper">

<header>
  <div>
    <div class="h1">자산 <span>대시보드</span></div>
    <div class="hsub">Personal Finance Overview</div>
  </div>
  <div class="update-time"><span class="dot"></span><span id="upd">로딩 중...</span></div>
</header>

<div class="section-label">자산 현황</div>
<div class="g5">
  <div class="card" style="padding:16px 18px">
    <div class="sbar" style="background:#4fffb0"></div>
    <div class="clabel">총 자산</div>
    <div class="cval" id="v-total">—</div>
    <div class="csub neutral" id="v-diff">전일 대비</div>
  </div>
  <div class="card" style="padding:16px 18px">
    <div class="sbar" style="background:#7eb3ff"></div>
    <div class="clabel">현금 / 예금</div>
    <div class="cval" id="v-cash">—</div>
    <div class="csub neutral" id="v-cash-p">비중 —</div>
  </div>
  <div class="card" style="padding:16px 18px">
    <div class="sbar" style="background:#4fffb0"></div>
    <div class="clabel">주식</div>
    <div class="cval" id="v-stock">—</div>
    <div class="csub neutral" id="v-stock-p">비중 —</div>
  </div>
  <div class="card" style="padding:16px 18px">
    <div class="sbar" style="background:#ffb347"></div>
    <div class="clabel">코인</div>
    <div class="cval" id="v-coin">—</div>
    <div class="csub neutral" id="v-coin-p">비중 —</div>
  </div>
  <div class="card" style="padding:16px 18px">
    <div class="sbar" style="background:#ff6b8a"></div>
    <div class="clabel">금</div>
    <div class="cval" id="v-gold">—</div>
    <div class="csub neutral" id="v-gold-p">비중 —</div>
  </div>
</div>

<div class="g21">
  <div class="card chart-outer">
    <div class="ch"><div class="ctitle">총 자산 추이</div><div class="cbadge">시작 ~ 현재</div></div>
    <div class="cw-lg" id="w-total"><div class="loading"><div class="spinner"></div>불러오는 중</div></div>
  </div>
  <div class="card">
    <div class="ch"><div class="ctitle">자산 비중</div><div class="cbadge">현재 기준</div></div>
    <div class="dlayout" id="w-donut"><div class="loading"><div class="spinner"></div>불러오는 중</div></div>
  </div>
</div>

<div class="section-label">자산 구성 추이</div>
<div class="card chart-outer" style="margin-bottom:20px">
  <div class="ch"><div class="ctitle">현금 / 주식 / 코인 / 금 비중 변화</div><div class="cbadge">전체 기간</div></div>
  <div class="cw-lg" id="w-alloc"><div class="loading"><div class="spinner"></div>불러오는 중</div></div>
</div>

<div class="section-label">주식 포트폴리오 구성</div>
<div class="g2">
  <div class="card">
    <div class="ch"><div class="ctitle">카테고리별 금액</div><div class="cbadge">현재 기준</div></div>
    <div id="w-bars"><div class="loading" style="height:200px"><div class="spinner"></div>불러오는 중</div></div>
  </div>
  <div class="card">
    <div class="ch"><div class="ctitle">카테고리별 비중</div><div class="cbadge">현재 기준</div></div>
    <div class="dlayout" id="w-sdonut"><div class="loading"><div class="spinner"></div>불러오는 중</div></div>
  </div>
</div>

<div class="section-label">시장 지수</div>
<div class="g2">
  <div class="card chart-outer">
    <div class="ch">
      <div class="ctitle">S&amp;P 500 <span class="cbadge" id="bdg-snp" style="margin-left:8px">+0%</span></div>
      <div class="tab-group" id="tabs-snp">
        <button class="tab active" onclick="switchTab('snp','6mo',this)">6개월</button>
        <button class="tab" onclick="switchTab('snp','1y',this)">1년</button>
        <button class="tab" onclick="switchTab('snp','3y',this)">3년</button>
      </div>
    </div>
    <div class="cw-lg" id="w-snp"><div class="loading"><div class="spinner"></div>불러오는 중</div></div>
  </div>
  <div class="card chart-outer">
    <div class="ch">
      <div class="ctitle">나스닥 (QQQ) <span class="cbadge" id="bdg-nas" style="margin-left:8px">+0%</span></div>
      <div class="tab-group" id="tabs-nas">
        <button class="tab active" onclick="switchTab('nas','6mo',this)">6개월</button>
        <button class="tab" onclick="switchTab('nas','1y',this)">1년</button>
        <button class="tab" onclick="switchTab('nas','3y',this)">3년</button>
      </div>
    </div>
    <div class="cw-lg" id="w-nas"><div class="loading"><div class="spinner"></div>불러오는 중</div></div>
  </div>
</div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyu63OGSiI_Xl_RG2L4i2WyGvcWZMT-NlQEkenL_XoCiulc5_a8FIwviil1i_rCfmZ13w/exec';
const PROXY = 'https://corsproxy.io/?';
const C = {cash:'#7eb3ff',stock:'#4fffb0',coin:'#ffb347',gold:'#ff6b8a',snp:'#4fffb0',schd:'#7eb3ff',qqq:'#c084fc',cc:'#ffb347'};

function fmt(n){
  if(n===undefined||n===null||isNaN(n))return'—';
  if(n>=1e8)return(n/1e8).toFixed(2)+'억원';
  if(n>=1e4)return Math.round(n/1e4).toLocaleString()+'만원';
  return Math.round(n).toLocaleString()+'원';
}
function fmtPct(n){return(n>=0?'+':'')+n.toFixed(2)+'%';}
function parseNum(s){if(!s&&s!==0)return 0;return parseFloat(String(s).replace(/,/g,''))||0;}

function parseLine(line){
  const cols=[];let cur='',inQ=false;
  for(const ch of line){
    if(ch==='"')inQ=!inQ;
    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}

async function loadData(){
  const res = await fetch(API_URL);
  const json = await res.json();
  console.log('[API 응답]', json.slice(0,2));
  return json.filter(r => r.total > 0).map(r => ({
    date:  String(r.date),
    total: Number(r.total),
    cash:  Number(r.cash),
    stock: Number(r.stock),
    coin:  Number(r.coin),
    gold:  Number(r.gold),
    snp:   Number(r.snp),
    schd:  Number(r.schd),
    qqq:   Number(r.qqq),
    cc:    Number(r.cc),
  }));
}

Chart.defaults.color='#5a6070';
Chart.defaults.borderColor='#1e2330';
Chart.defaults.font.family="'DM Mono',monospace";
const TT={backgroundColor:'#181c24',borderColor:'#1e2330',borderWidth:1,titleColor:'#8892a4',bodyColor:'#e8eaf0',padding:12,cornerRadius:6};

function lineChart(id,label,color,data,labels,yFn){
  const el=document.getElementById(id);if(!el)return;
  return new Chart(el,{
    type:'line',
    data:{labels,datasets:[{label,data,borderColor:color,backgroundColor:color+'18',borderWidth:2,pointRadius:0,pointHoverRadius:5,fill:true,tension:0.3}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{...TT,callbacks:{
          title:ctx=>'📅 '+ctx[0].label,
          label:ctx=>'  '+label+': '+(yFn?yFn(ctx.raw):ctx.raw.toLocaleString()),
        }}
      },
      scales:{
        x:{grid:{color:'#1a1e28'},ticks:{maxTicksLimit:8,font:{size:10}}},
        y:{grid:{color:'#1a1e28'},ticks:{font:{size:10},callback:v=>yFn?yFn(v):v}}
      }
    }
  });
}

function donutChart(id,labels,data,colors,total){
  const el=document.getElementById(id);if(!el)return;
  return new Chart(el,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:6}]},
    options:{
      responsive:false,cutout:'70%',
      plugins:{
        legend:{display:false},
        tooltip:{...TT,callbacks:{label:ctx=>'  '+fmt(ctx.raw)+' ('+((ctx.raw/(total||1))*100).toFixed(1)+'%)'}}
      }
    }
  });
}

function buildDonut(wrapId,canvasId,centerLabel,items,total){
  const wrap=document.getElementById(wrapId);if(!wrap)return;
  wrap.innerHTML=`
    <div class="dbox" style="width:155px;height:155px">
      <canvas id="${canvasId}" width="155" height="155"></canvas>
      <div class="dcenter">
        <div class="dcval">${fmt(total)}</div>
        <div class="dclabel">${centerLabel}</div>
      </div>
    </div>
    <div class="legend" id="leg-${canvasId}"></div>`;
  donutChart(canvasId,items.map(i=>i.name),items.map(i=>i.val),items.map(i=>i.color),total);
  const leg=document.getElementById('leg-'+canvasId);
  items.forEach(item=>{
    const p=((item.val/(total||1))*100).toFixed(1);
    leg.innerHTML+=`<div class="li">
      <div class="ll"><div class="ldot" style="background:${item.color}"></div>${item.name}</div>
      <div style="text-align:right">
        <div class="lpct" style="color:${item.color}">${p}%</div>
        <div class="lval">${fmt(item.val)}</div>
      </div>
    </div>`;
  });
}

async function render(){
  let rows;
  try{
    rows=await loadData();
    console.log('[로드 성공]',rows.length+'행 / 최신:',rows[rows.length-1]);
  }catch(e){
    console.error(e);
    document.querySelectorAll('.loading').forEach(el=>{
      el.innerHTML=`<span style="color:#ff4d6d;font-size:11px">로드 실패: ${e.message}</span>`;
    });
    document.getElementById('v-total').innerHTML=`<span style="color:#ff4d6d;font-size:12px">로드 실패</span>`;
    return;
  }
  if(!rows.length){document.getElementById('v-total').textContent='데이터 없음';return;}

  const latest=rows[rows.length-1];
  const prev=rows.length>1?rows[rows.length-2]:null;
  const t=latest.total||1;

  // 주식 카테고리: 백만원 이상인 행만 인정 (퍼센트 수식값 93, 3.3 등 필터링)
  const sRow=[...rows].reverse().find(r=>r.snp>1000000||r.schd>1000000||r.qqq>1000000||r.cc>1000000)||null;
  console.log('[주식행]',sRow);

  // 카드
  document.getElementById('v-total').textContent=fmt(latest.total);
  document.getElementById('v-cash').textContent=fmt(latest.cash);
  document.getElementById('v-stock').textContent=fmt(latest.stock);
  document.getElementById('v-coin').textContent=fmt(latest.coin);
  document.getElementById('v-gold').textContent=fmt(latest.gold);
  document.getElementById('v-cash-p').textContent='비중 '+(latest.cash/t*100).toFixed(1)+'%';
  document.getElementById('v-stock-p').textContent='비중 '+(latest.stock/t*100).toFixed(1)+'%';
  document.getElementById('v-coin-p').textContent='비중 '+(latest.coin/t*100).toFixed(1)+'%';
  document.getElementById('v-gold-p').textContent='비중 '+(latest.gold/t*100).toFixed(1)+'%';
  document.getElementById('upd').textContent='기준: '+latest.date+' 기록';

  if(prev){
    const diff=latest.total-prev.total;
    const pct=(diff/prev.total)*100;
    const el=document.getElementById('v-diff');
    el.textContent=fmtPct(pct)+' ('+fmt(Math.abs(diff))+')';
    el.className='csub '+(diff>=0?'up':'down');
  }

  const labels=rows.map(r=>r.date);

  // 총자산 추이
  document.getElementById('w-total').innerHTML='<canvas id="c-total"></canvas>';
  lineChart('c-total','총 자산','#4fffb0',rows.map(r=>r.total),labels,fmt);

  // 자산 비중 도넛
  buildDonut('w-donut','c-donut','총 자산',[
    {name:'현금',val:latest.cash,color:C.cash},
    {name:'주식',val:latest.stock,color:C.stock},
    {name:'코인',val:latest.coin,color:C.coin},
    {name:'금',val:latest.gold,color:C.gold},
  ],latest.total);

  // 비중 추이
  document.getElementById('w-alloc').innerHTML='<canvas id="c-alloc"></canvas>';
  new Chart(document.getElementById('c-alloc'),{
    type:'line',
    data:{labels,datasets:[
      {label:'현금',data:rows.map(r=>r.total?+(r.cash/r.total*100).toFixed(2):0),borderColor:C.cash,backgroundColor:C.cash+'22',fill:true,borderWidth:1.5,pointRadius:0,tension:0.3},
      {label:'주식',data:rows.map(r=>r.total?+(r.stock/r.total*100).toFixed(2):0),borderColor:C.stock,backgroundColor:C.stock+'22',fill:true,borderWidth:1.5,pointRadius:0,tension:0.3},
      {label:'코인',data:rows.map(r=>r.total?+(r.coin/r.total*100).toFixed(2):0),borderColor:C.coin,backgroundColor:C.coin+'22',fill:true,borderWidth:1.5,pointRadius:0,tension:0.3},
      {label:'금',data:rows.map(r=>r.total?+(r.gold/r.total*100).toFixed(2):0),borderColor:C.gold,backgroundColor:C.gold+'22',fill:true,borderWidth:1.5,pointRadius:0,tension:0.3},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'top',labels:{font:{size:10},boxWidth:10,padding:14}},
        tooltip:{...TT,callbacks:{label:ctx=>'  '+ctx.dataset.label+': '+ctx.raw.toFixed(1)+'%'}}
      },
      scales:{
        x:{grid:{color:'#1a1e28'},ticks:{maxTicksLimit:8,font:{size:10}}},
        y:{grid:{color:'#1a1e28'},ticks:{font:{size:10},callback:v=>v+'%'},min:0,max:100}
      }
    }
  });

  // 주식 카테고리 바
  const sItems=[
    {name:'S&P500',val:sRow?sRow.snp:0,color:C.snp},
    {name:'SCHD',val:sRow?sRow.schd:0,color:C.schd},
    {name:'QQQ',val:sRow?sRow.qqq:0,color:C.qqq},
    {name:'커버드콜',val:sRow?sRow.cc:0,color:C.cc},
  ];
  const sTotal=sItems.reduce((a,b)=>a+b.val,0);
  const wB=document.getElementById('w-bars');

  if(sTotal===0){
    wB.innerHTML=`<div style="padding:30px 20px;color:#5a6070;font-size:11px;text-align:center;line-height:2">
      주식 카테고리 데이터가 아직 없습니다.<br>
      <small style="color:#3a4050">내일 오전 Apps Script 자동 실행 후 반영됩니다</small>
    </div>`;
  }else{
    wB.innerHTML='<div class="sbars"></div>';
    const bEl=wB.querySelector('.sbars');
    sItems.forEach(item=>{
      const p=sTotal?(item.val/sTotal*100).toFixed(1):'0.0';
      bEl.innerHTML+=`<div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="sbname">${item.name}</div>
          <div style="display:flex;gap:10px;align-items:center">
            <div class="sbamt" style="color:${item.color}">${fmt(item.val)}</div>
            <div class="sbpct">${p}%</div>
          </div>
        </div>
        <div class="track"><div class="fill" style="width:${p}%;background:${item.color}"></div></div>
      </div>`;
    });
  }

  // 주식 도넛
  if(sTotal>0){
    buildDonut('w-sdonut','c-sdonut','주식 합계',sItems,sTotal);
  }else{
    document.getElementById('w-sdonut').innerHTML=`<div style="padding:20px;color:#5a6070;font-size:11px;text-align:center;line-height:2">
      카테고리 데이터 없음<br><small style="color:#3a4050">CSV 재게시 후 새로고침 해주세요</small></div>`;
  }

  // 시장 지수 — 기본 1개월로 시작
  renderMarket('SPY','snp','S&P 500','#4fffb0','6mo');
  renderMarket('QQQ','nas','나스닥(QQQ)','#7eb3ff','6mo');
}

// 기간별 설정
const RANGE_CONFIG = {
  '6mo': { range:'6mo', interval:'1d', label:'6개월' },
  '1y':  { range:'1y',  interval:'1d', label:'1년'   },
  '3y':  { range:'3y',  interval:'1wk', label:'3년'  },
};

// 차트 인스턴스 저장
const marketCharts = {};

async function renderMarket(symbol, key, name, color, rangeKey) {
  const wrapId  = 'w-'+key;
  const canvasId = 'c-'+key;
  const badgeId  = 'bdg-'+key;
  const wrap = document.getElementById(wrapId);
  const cfg  = RANGE_CONFIG[rangeKey];

  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중</div>';

  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=${cfg.interval}&range=${cfg.range}`;
    const res  = await fetch(PROXY + encodeURIComponent(url));
    const json = await res.json();
    const result = json?.chart?.result?.[0];
    if (!result) throw new Error('응답 없음');

    const ts = result.timestamp || [];
    const cl = result.indicators.quote[0].close || [];
    const pts = ts.map((t,i) => ({t, v:cl[i]})).filter(p => p.v !== null && !isNaN(p.v));
    if (!pts.length) throw new Error('유효 데이터 없음');

    // x축: 일별 MM/DD, 주별 YYYY.MM
    const labs = pts.map(p => {
      const d = new Date(p.t * 1000);
      if (cfg.interval === '1d') {
        return (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getDate().toString().padStart(2,'0');
      } else {
        return d.getFullYear() + '.' + (d.getMonth()+1).toString().padStart(2,'0');
      }
    });
    const vals = pts.map(p => p.v);

    const pct = ((vals[vals.length-1] - vals[0]) / vals[0] * 100).toFixed(2);
    const bdg = document.getElementById(badgeId);
    bdg.textContent = cfg.label + ' ' + (pct >= 0 ? '+' : '') + pct + '%';
    bdg.style.color  = pct >= 0 ? '#4fffb0' : '#ff4d6d';

    wrap.innerHTML = `<canvas id="${canvasId}"></canvas>`;

    // 기존 차트 파괴 후 재생성
    if (marketCharts[key]) { marketCharts[key].destroy(); }
    marketCharts[key] = lineChart(canvasId, name, color, vals, labs, v => v.toFixed(2));

    // 탭 전환을 위해 symbol/color 저장
    wrap.dataset.symbol = symbol;
    wrap.dataset.name   = name;
    wrap.dataset.color  = color;
    wrap.dataset.key    = key;

  } catch(e) {
    console.error('[시장지수]', name, e);
    wrap.innerHTML = `<div class="err">${name} 로드 실패<br><small>${e.message}</small></div>`;
  }
}

function switchTab(key, rangeKey, btn) {
  // 탭 활성화 스타일
  document.querySelectorAll(`#tabs-${key} .tab`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const wrap   = document.getElementById('w-'+key);
  const symbol = wrap.dataset.symbol;
  const name   = wrap.dataset.name;
  const color  = wrap.dataset.color;
  renderMarket(symbol, key, name, color, rangeKey);
}

render();
</script>
